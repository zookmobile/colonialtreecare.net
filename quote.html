<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get a Free Estimate | Colonial Tree Care</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f7f6f3;
    color: #2b2b2b;
  }
  header {
    background: #1f5c43;
    color: #fff;
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header .logo {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  nav a {
    color: #fff;
    text-decoration: none;
    margin-left: 25px;
    font-size: 0.95rem;
  }
  nav a:hover { color: #3f8d7f; }

  .quote-hero {
    background: #1f5c43;
    color: #fff;
    text-align: center;
    padding: 60px 5% 50px;
  }
  .quote-hero h1 {
    font-size: 2.2rem;
    margin-bottom: 12px;
  }
  .quote-hero p {
    font-size: 1.05rem;
    color: #d9e9e2;
    max-width: 600px;
    margin: 0 auto;
  }

  .form-wrap {
    max-width: 600px;
    margin: -30px auto 60px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    padding: 40px;
  }
  label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    color: #1f5c43;
    font-size: 0.95rem;
  }
  input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #3f8d7f;
    box-shadow: 0 0 0 2px rgba(63,141,127,0.2);
  }
  textarea { resize: vertical; min-height: 100px; }

  button {
    background: #7a2d3a;
    color: #fff;
    border: none;
    padding: 14px 28px;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  button:hover { background: #5e2230; }

  .confirmation {
    display: none;
    text-align: center;
    color: #1f5c43;
    font-size: 1.1rem;
    font-weight: 600;
    padding: 20px 0;
  }

  footer {
    background: #1f5c43;
    color: #d9e9e2;
    text-align: center;
    padding: 20px;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Colonial Tree Care</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="quote.html">Get a Quote</a>
  </nav>
</header>

<div class="quote-hero">
  <h1>Get a Free Estimate</h1>
  <p>Tell us a bit about your property and what you need, and we'll get back to you quickly with a free, no-obligation estimate.</p>
</div>

<div class="form-wrap">
  <form id="quoteForm" action="https://formspree.io/f/mnjkvkpd" method="POST">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" required>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required>

    <label for="address">Property Address</label>
    <input type="text" id="address" name="address" required>

    <label for="service">Service Needed</label>
    <select id="service" name="service" required>
      <option value="">-- Select a Service --</option>
      <option value="Tree Removal">Tree Removal</option>
      <option value="Tree Trimming/Pruning">Tree Trimming / Pruning</option>
      <option value="Stump Grinding">Stump Grinding</option>
      <option value="Storm Damage Cleanup">Storm Damage Cleanup</option>
      <option value="Land Clearing">Land Clearing</option>
      <option value="Other">Other</option>
    </select>

    <label for="details">Tell us more about the job</label>
    <textarea id="details" name="details" placeholder="Number of trees, size, location on property, etc."></textarea>

    <button type="submit">Request My Free Estimate</button>
  </form>
  <div class="confirmation" id="confirmation">✅ Thanks! Your request has been sent — we'll be in touch soon.</div>
</div>

<footer>
  &copy; 2026 Colonial Tree Care. All Rights Reserved.
</footer>

</body>
</html>
